name: Keep Supabase Alive

# Supabase (plan gratuit) met le projet en pause après une longue période
# sans activité API. Ce workflow envoie un ping léger tous les 3 jours pour
# garder le projet actif — pas besoin d'action manuelle sur le dashboard.

on:
  schedule:
    - cron: '0 6 */3 * *' # toutes les 72h à 06:00 UTC
  workflow_dispatch: {} # déclenchement manuel depuis l'onglet Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health endpoint
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/health")
          echo "Statut HTTP : $status"
          if [ "$status" -ge 400 ]; then
            echo "::error::Le ping Supabase a échoué (HTTP $status)"
            exit 1
          fi
